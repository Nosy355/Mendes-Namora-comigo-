<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namora comigo?</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', cursive;
  background: linear-gradient(to bottom, #ffe6f0, #ffffff);
  overflow: hidden;
  text-align: center;
}

h1 { margin-top: 20vh; font-size: 2.5rem; color: #d6336c; }

.container { position: relative; z-index: 2; }

button {
  padding: 15px 25px;
  font-size: 1.2rem;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin: 15px;
  transition: all 0.3s ease;
}

#yesBtn {
  background-color: #ff4d88;
  color: white;
  box-shadow: 0 0 15px rgba(255, 77, 136, 0.8);
}

#yesBtn:hover { transform: scale(1.1); }

#noBtn { background-color: #ccc; }

.flower {
  position: absolute;
  width: 30px;
  animation: float 10s linear infinite;
}

@keyframes float {
  0% { transform: translateY(-100px); }
  100% { transform: translateY(110vh); }
}

#loveScreen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  z-index: 5;
  text-align: center;
}

#loveScreen h2 {
  margin-top: 30vh;
  font-size: 3rem;
  color: red;
}

#loveScreen p { font-size: 1.5rem; }

.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity: 1; }
  100% { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>
<div class="container">
  <h1>Namora comigo Mendes? 💘</h1>
  <button id="yesBtn" onclick="showLove()">SIMM! 💖</button>
  <button id="noBtn" onmouseover="moveNo()">Não 😢</button>
</div>

<div id="loveScreen">
  <h2>EU SABIA!!! ❤️</h2>
  <p>Agora você é oficialmente meu amor 💞</p>
</div>

<script>
function showLove() {
  document.getElementById('loveScreen').style.display = 'block';
  createHearts();
}

function moveNo() {
  const btn = document.getElementById('noBtn');
  btn.style.position = 'absolute';
  btn.style.top = Math.random() * window.innerHeight + 'px';
  btn.style.left = Math.random() * window.innerWidth + 'px';
}

function createHearts() {
  setInterval(() => {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '❤️';
    heart.style.left = Math.random() * window.innerWidth + 'px';
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
